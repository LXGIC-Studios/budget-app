<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>STACKD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style id="expo-reset">
      html, body { height: 100%; margin: 0; padding: 0; }
      body {
        overflow: hidden;
        background: #000;
        font-family: 'Space Grotesk', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root { display: flex; height: 100%; flex: 1; }

      /* Scanline overlay for the terminal vibe */
      body::after {
        content: '';
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 255, 204, 0.012) 2px,
          rgba(0, 255, 204, 0.012) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: #000; }
      ::-webkit-scrollbar-thumb { background: #00ffcc; }

      /* Selection color */
      ::selection { background: #00ffcc; color: #000; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run STACKD.</noscript>
    <div id="root"></div>
  </body>
</html>
